<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google ViT Image Tester</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; margin: 20px 0; }
        .upload-area.dragover { border-color: #007bff; background: #f8f9fa; }
        .preview { max-width: 400px; max-height: 300px; margin: 20px auto; display: block; }
        .results { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .server-status { padding: 10px; border-radius: 4px; margin: 10px 0; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        .loading { color: #007bff; }
    </style>
</head>
<body>
    <h1>🤖 Google ViT Image Analyzer</h1>
    
    <div id="serverStatus" class="server-status offline">
        Checking Google ViT servers...
    </div>

    <div class="upload-area" id="uploadArea">
        <p>📁 Drop an image here or click to select</p>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('imageInput').click()">Choose Image</button>
    </div>

    <img id="preview" class="preview" style="display: none;">
    
    <div id="results" class="results" style="display: none;">
        <h3>Analysis Results:</h3>
        <div id="analysisOutput"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const results = document.getElementById('results');
        const analysisOutput = document.getElementById('analysisOutput');
        const serverStatus = document.getElementById('serverStatus');

        let vitServer = null;

        // Check server status
        async function checkServers() {
            const servers = [
                { url: 'http://localhost:5002', name: 'Google ViT (Hugging Face)' },
                { url: 'http://localhost:5006', name: 'Your Google ViT (Local Model)' }
            ];

            for (const server of servers) {
                try {
                    const response = await fetch(`${server.url}/health`);
                    if (response.ok) {
                        vitServer = server;
                        serverStatus.className = 'server-status online';
                        serverStatus.textContent = `✅ ${server.name} - Online`;
                        return;
                    }
                } catch (error) {
                    console.log(`${server.name} offline`);
                }
            }
            
            serverStatus.className = 'server-status offline';
            serverStatus.textContent = '❌ No Google ViT servers available';
        }

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleImage(files[0]);
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleImage(e.target.files[0]);
        });

        function handleImage(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);

            // Analyze image
            analyzeImage(file);
        }

        async function analyzeImage(file) {
            if (!vitServer) {
                alert('No Google ViT server available');
                return;
            }

            results.style.display = 'block';
            analysisOutput.innerHTML = '<div class="loading">🔄 Analyzing image with Google ViT...</div>';

            try {
                const formData = new FormData();
                formData.append('image', file);

                const response = await fetch(`${vitServer.url}/analyze`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error(`Server error: ${response.status}`);

                const result = await response.json();
                displayResults(result);

            } catch (error) {
                analysisOutput.innerHTML = `<div style="color: red;">❌ Analysis failed: ${error.message}</div>`;
            }
        }

        function displayResults(result) {
            if (result.success && result.analysis) {
                const analysis = result.analysis;
                
                analysisOutput.innerHTML = `
                    <h4>🎯 Object Detection:</h4>
                    <p><strong>Raw ViT Prediction:</strong> ${analysis.raw_prediction || 'N/A'}</p>
                    <p><strong>Detected Objects:</strong> ${analysis.detected_objects ? analysis.detected_objects.join(', ') : 'None'}</p>
                    
                    <h4>🏛️ Municipal Classification:</h4>
                    <p><strong>Category:</strong> ${analysis.category}</p>
                    <p><strong>Department:</strong> ${analysis.department}</p>
                    <p><strong>Priority:</strong> ${analysis.priority}</p>
                    <p><strong>Confidence:</strong> ${(analysis.confidence * 100).toFixed(1)}%</p>
                    
                    <h4>📝 Description:</h4>
                    <p>${analysis.description}</p>
                    
                    ${analysis.matched_keywords ? `
                    <h4>🔍 Matched Keywords:</h4>
                    <p>${analysis.matched_keywords.join(', ')}</p>
                    ` : ''}
                    
                    ${analysis.opencv_analysis ? `
                    <h4>👁️ Computer Vision Analysis:</h4>
                    <p><strong>Surface Analysis:</strong></p>
                    <ul>
                        <li>Asphalt: ${(analysis.opencv_analysis.color_analysis.asphalt_ratio * 100).toFixed(1)}%</li>
                        <li>Concrete: ${(analysis.opencv_analysis.color_analysis.concrete_ratio * 100).toFixed(1)}%</li>
                        <li>Vegetation: ${(analysis.opencv_analysis.color_analysis.vegetation_ratio * 100).toFixed(1)}%</li>
                    </ul>
                    <p><strong>Detected Features:</strong> ${analysis.opencv_analysis.detected_features.join(', ') || 'None'}</p>
                    ` : ''}
                `;
            } else {
                analysisOutput.innerHTML = `<div style="color: red;">❌ Analysis failed: ${result.error || 'Unknown error'}</div>`;
            }
        }

        // Initialize
        checkServers();
        setInterval(checkServers, 30000); // Check every 30 seconds
    </script>
</body>
</html>
